<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>공지사항 작성</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

  <link rel="stylesheet" th:href="@{/css/admin/managerSidebar.css}">
  <link rel="stylesheet" th:href="@{/css/notice/create.css}">

</head>
<body>

<div class="wrapper">
  <!-- 사이드바 추가 -->
  <div class="adminSidebarWrap">
    <div class="sidebar" th:replace="~{fragments/managerSidebar :: sidebar}"></div>
  </div>

  <!-- 공지사항 작성 컨텐츠 -->
  <div class="notice-container">
    <h3 class="mb-4">공지사항 작성</h3>

    <form th:action="@{/admin/notice}" method="post">
      <!-- 제목 입력 -->
      <div class="form-group">
        <label for="title">제목:</label>
        <input type="text" id="title" name="title" th:value="${notice.title}" class="form-control" required>
      </div>

      <!-- 썸머노트 적용 -->
      <div class="form-group">
        <label for="content">내용:</label>
        <textarea id="content" name="content" class="form-control" required th:utext="${notice.content}"></textarea>
      </div>

      <!-- 작성 버튼 -->
      <div class="text-end">
        <button type="submit" class="btn btn-primary">작성</button>
      </div>
    </form>
  </div>
</div>

<!-- Summernote 초기화 -->
<script>
  $(document).ready(function() {
    $('#content').summernote({
      placeholder: '내용을 입력하세요',
      tabsize: 2,
      height: 300,
      toolbar: [
        ['style', ['bold', 'italic', 'underline', 'clear']],
        ['font', ['strikethrough', 'superscript', 'subscript']],
        ['fontsize', ['fontsize']],
        ['color', ['color']],
        ['para', ['ul', 'ol', 'paragraph']],
        ['height', ['height']],
        ['insert', ['link']],
        ['view', ['fullscreen', 'codeview', 'help']]
      ]
    });
  });
</script>

</body>
</html>
